global:
  cluster:
    name: cluster-cg7rd
    baseDomain: cg7rd.sandbox2231.opentlc.com
  toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest

# WASM shim workaround (CONNLINK-805) — enables rhcl + gateway-api disconnected templates.
# OpenTLC sandboxes use registry.redhat.io (in pull-secret), not registry.access.redhat.com.
disconnected:
  enabled: true
  wasmShimImage: registry.redhat.io/rhcl-1/wasm-shim-rhel9@sha256:4b8cd7dea4d9cd3c7170af872c229e206155691e7dbb4a90c64699ccecc7ccbb
  protectedRegistry: registry.redhat.io
  gatewayConfig:
    wasmInsecureRegistries: registry.redhat.io
    serviceType: ClusterIP

maas:
  postgres:
    deploy:
      enabled: true
    dbConfig:
      secretName: maas-db-config
