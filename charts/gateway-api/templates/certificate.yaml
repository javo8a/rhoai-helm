{{- range $name, $gw := .Values.gateways }}
{{- range $lname, $listener := $gw.listeners }}
{{- $cert := default dict $listener.certificate -}}
{{- if and $listener.tls $cert.create }}
{{- $secretName := default (index (first $listener.tls.certificateRefs) "name") $cert.secretName -}}
{{- $gwNs := default $.Release.Namespace $gw.namespace -}}
{{- $hostname := tpl $listener.hostname $ -}}
{{- $commonName := default $hostname $cert.commonName -}}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $secretName }}
  namespace: {{ $gwNs }}
  {{- with $cert.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $cert.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ $secretName }}
  issuerRef:
    {{- required (printf "gateways.%s.listeners.%s.certificate.issuerRef is required when certificate.create is true" $name $lname) $cert.issuerRef | toYaml | nindent 4 }}
  dnsNames:
    - {{ $hostname | quote }}
    {{- range $cert.dnsNames }}
    - {{ tpl . $ | quote }}
    {{- end }}
  commonName: {{ tpl $commonName $ | quote }}
  {{- with $cert.duration }}
  duration: {{ . | quote }}
  {{- end }}
  {{- with $cert.renewBefore }}
  renewBefore: {{ . | quote }}
  {{- end }}
  {{- with $cert.usages }}
  usages:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $cert.subject }}
  subject:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $cert.privateKey }}
  privateKey:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
