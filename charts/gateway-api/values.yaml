global:
  cluster:
    name: cluster
    baseDomain: example.com

# Disconnected cluster workaround (CONNLINK-805): optional per cluster via cluster.yaml.
# Creates default-gateway-config in openshift-ingress for WASM shim pulls from internal artifactory.
disconnected:
  enabled: false
  gatewayConfig:
    name: default-gateway-config
    namespace: openshift-ingress
    wasmInsecureRegistries: ""
    # Set to ClusterIP for lab environments that require it; omit or leave empty otherwise.
    serviceType: ""

gatewayClasses:
  openshift-default:
    controllerName: openshift.io/gateway-controller/v1

gateways:
  maas-default-gateway:
    namespace: openshift-ingress
    gatewayClassName: openshift-default
    metadata:
      annotations:
        opendatahub.io/managed: "false"
        security.opendatahub.io/authorino-tls-bootstrap: "true"
      labels:
        app.kubernetes.io/component: gateway
        app.kubernetes.io/instance: maas-default-gateway
        app.kubernetes.io/name: maas
        istio.io/rev: openshift-gateway
        opendatahub.io/managed: "false"
    listeners:
      http:
        hostname: "maas.apps.{{ .Values.global.cluster.name }}.{{ .Values.global.cluster.baseDomain }}"
        port: 80
        protocol: HTTP
      https:
        hostname: "maas.apps.{{ .Values.global.cluster.name }}.{{ .Values.global.cluster.baseDomain }}"
        port: 443
        protocol: HTTPS
        tls:
          mode: Terminate
          certificateRefs:
            - group: ""
              kind: Secret
              name: maas-default-gateway-venafi-tls
        certificate:
          create: false
          secretName: maas-default-gateway-venafi-tls
          issuerRef:
            group: cert-manager.io
            kind: ClusterIssuer
            name: venafi-tpp-cluster-issuer
          dnsNames: []
          commonName: ""
          duration: ""
          renewBefore: ""
          usages: []
          subject: {}
          privateKey: {}
          annotations: {}
          labels: {}

# Optional OpenShift Route for external MaaS access (HAProxy layer).
# Disabled by default — enable when you want Helm to manage the Route instead of creating it manually.
# Uses streaming-friendly HAProxy annotations (long timeout, forwarded headers).
route:
  create: false
  name: maas-default-gateway
  hostname: ""  # default: maas.apps.{cluster.name}.{cluster.baseDomain}
  # Service created by the OpenShift Gateway controller; override if auto-discovery differs.
  serviceName: maas-default-gateway-openshift-default
  targetPort: 80
  timeout: 10m
  forwardedHeaders: append
  annotations: {}
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
