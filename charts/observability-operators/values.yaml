global:
  toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest

install-observability:
  enabled: true
  operators:
    tempo-product:
      channel: stable
      installPlanApproval: Manual
      namespace: openshift-tempo-operator
      operatorGroup:
        enabled: true
      startingCSV: tempo-operator.v0.20.0-3
    cluster-observability-operator:
      channel: stable
      installPlanApproval: Manual
      namespace: openshift-cluster-observability-operator
      operatorGroup:
        enabled: true
      startingCSV: cluster-observability-operator.v1.4.0
    opentelemetry-product:
      channel: stable
      installPlanApproval: Manual
      namespace: openshift-opentelemetry-operator
      operatorGroup:
        enabled: true
      startingCSV: opentelemetry-operator.v0.144.0-3

# perses-operator is deployed from the COO CSV in openshift-cluster-observability-operator;
# defaults are 128Mi/100m and COO reconcile will revert deployment-only patches (COO-784).
csvPatch:
  csvName: cluster-observability-operator.v1.4.0
  subscription: cluster-observability-operator

persesOperator:
  resourcesPatch:
    enabled: true
    requests:
      memory: 3Gi
      cpu: 200m
    limits:
      memory: 5Gi
      cpu: 500m
