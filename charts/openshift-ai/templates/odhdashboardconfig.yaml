apiVersion: v1
kind: ServiceAccount
metadata:
  name: apply-odh-dashboard-config
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: apply-odh-dashboard-config
  namespace: redhat-ods-applications
rules:
  - apiGroups: ["opendatahub.io"]
    resources: ["odhdashboardconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: apply-odh-dashboard-config
  namespace: redhat-ods-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: apply-odh-dashboard-config
subjects:
  - kind: ServiceAccount
    name: apply-odh-dashboard-config
    namespace: redhat-ods-applications
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apply-odh-dashboard-config
  namespace: redhat-ods-applications
data:
  odh-dashboard-config.yaml: |
    ---
    # Enables Gen AI Studio (Playground) in the OpenShift AI dashboard.
    # The dashboard operator may create a default OdhDashboardConfig when the dashboard
    # component is deployed; applying this sets genAiStudio: true (create or merge).
    apiVersion: opendatahub.io/v1alpha
    kind: OdhDashboardConfig
    metadata:
      name: odh-dashboard-config
      namespace: redhat-ods-applications
      labels:
        app.kubernetes.io/part-of: rhods-dashboard
        app.opendatahub.io/rhods-dashboard: "true"
    spec:
      dashboardConfig:
        {{- toYaml .Values.dashboardConfig | nindent 8 }}
  apply-odh-dashboard-config.sh: |
{{ .Files.Get "files/apply-odh-dashboard-config.sh" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: apply-odh-dashboard-config
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "2"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 12
  template:
    spec:
      serviceAccountName: apply-odh-dashboard-config
      restartPolicy: Never
      containers:
        - name: apply-odh-dashboard-config
          image: {{ .Values.global.toolsImage }}
          imagePullPolicy: IfNotPresent
          command: ["/scripts/apply-odh-dashboard-config.sh"]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: config
          configMap:
            name: apply-odh-dashboard-config
        - name: scripts
          configMap:
            name: apply-odh-dashboard-config
            items:
              - key: apply-odh-dashboard-config.sh
                path: apply-odh-dashboard-config.sh
            defaultMode: 493
