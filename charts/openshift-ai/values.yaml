---
global:
  toolsImage: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
  cluster:
    name: cluster
    baseDomain: example.com

install-rhoai:
  enabled: true
  operators:
    rhods-operator:
      channel: stable-3.x
      installPlanApproval: Manual
      namespace: redhat-ods-operator
      startingCSV: rhods-operator.3.4.0
      operatorGroup:
        enabled: true

rbac:
  create: true
  group: system:authenticated:oauth

mcpServers: {}

gateways:
  openshiftAiInference:
    create: false

enableUserTelemetry: false

dashboardReplicas: null
operatorReplicas: null

dataScienceCluster:
  create: true
  version: v2
  components:
    kserve:
      managementState: Managed
      nim:
        managementState: Managed
      rawDeploymentServiceConfig: Headless
      modelsAsService:
        managementState: Managed
    modelregistry:
      managementState: Managed
      registriesNamespace: rhoai-model-registries
    feastoperator:
      managementState: Removed
    trustyai:
      eval:
        lmeval:
          permitCodeExecution: deny
          permitOnline: deny
      managementState: Managed
    aipipelines:
      argoWorkflowsControllers:
        managementState: Managed
      managementState: Removed
    ray:
      managementState: Removed
    kueue:
      defaultClusterQueueName: default
      defaultLocalQueueName: default
      managementState: Removed
    workbenches:
      managementState: Managed
      workbenchNamespace: rhods-notebooks
    mlflowoperator:
      managementState: Removed
    dashboard:
      managementState: Managed
    trainer:
      managementState: Removed
    llamastackoperator:
      managementState: Managed
    trainingoperator:
      managementState: Removed

dataScienceClusterInitialization:
  applicationsNamespace: redhat-ods-applications
  monitoring:
    managementState: Managed
    namespace: redhat-ods-monitoring
    alerting: {}
    metrics:
      replicas: 1
      storage:
        size: 5Gi
        retention: 90d
      exporters: {}
    traces:
      sampleRatio: "0.1"
      storage:
        backend: pv
        retention: 2160h0m0s
      exporters: {}
  trustedCABundle:
    customCABundle: ""
    managementState: Managed

clusterMonitoring:
  enabled: true

# When modelsAsService is Managed on the DataScienceCluster, the MaaS operator
# reconciles maas-authorino-allow; leave disabled to avoid Helm SSA conflicts
# with the operator-owned podSelector and labels.
maasAuthorinoNetworkPolicy:
  enabled: false

hardwareProfiles: {}

admins: []
userGroups:
  - system:authenticated

dashboardConfig:
  modelAsService: true
  genAiStudio: true
  observabilityDashboard: true
  vLLMDeploymentOnMaaS: true
  maasAuthPolicies: true

defaultWorkbenchPvcSize: 20Gi
showJupyterInEnabledApplications: true
notebookIdleCulling:
  enabled: true
  timeoutInMinutes: 240

mlflow:
  create: false

evalhub:
  create: false

# bootstrap.sh: restart rhods-dashboard after OdhDashboardConfig changes
dashboardRestart:
  enabled: true
  deploymentName: rhods-dashboard

# RHOAI component controllers are reconciled by rhods-operator after apply-dsc.
# These workloads are not embedded in the rhods-operator CSV; patch live Deployments/StatefulSets.
controllerResourcesPatch:
  enabled: true
  defaults:
    requests:
      memory: 3Gi
      cpu: 200m
    limits:
      memory: 5Gi
      cpu: 500m
  maasController:
    enabled: true
    workloadName: maas-controller
    container: manager
  kserveController:
    enabled: true
    workloadName: kserve-controller-manager
    container: manager
  llmisvcController:
    enabled: true
    workloadName: llmisvc-controller-manager
    container: manager
  dataScienceCollector:
    enabled: true
    workloadName: data-science-collector-collector
    container: otc-container
    openTelemetryCollector: data-science-collector
